x-volumes: &x-volumes
  - ./..:/etc/develop:ro

services:
  temporal-left:
    image: temporalio/temporal:1.5.0
    command:
      - server
      - start-dev
      - --port
      - "7233"
      - --ip
      - "0.0.0.0"
      - --headless
      - --namespace
      - default
      - --log-level
      - warn
    ports:
      - "${TEMPORAL_LEFT_PORT}:7233"
    networks:
      - develop
    healthcheck:
      test:
        - CMD
        - temporal
        - operator
        - cluster
        - health
        - --address
        - "localhost:7233"
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 5s

  temporal-right:
    image: temporalio/temporal:1.5.0
    command:
      - server
      - start-dev
      - --port
      - "7233"
      - --ip
      - "0.0.0.0"
      - --headless
      - --namespace
      - default
      - --log-level
      - warn
    ports:
      - "${TEMPORAL_RIGHT_PORT}:7233"
    networks:
      - develop
    healthcheck:
      test:
        - CMD
        - temporal
        - operator
        - cluster
        - health
        - --address
        - "localhost:7233"
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 5s

  proxy-right:
    build:
      context: ../..
      dockerfile: Dockerfile
    environment:
      CONFIG_YML: /etc/develop/docker-compose/develop.proxy-right.yaml
    volumes: *x-volumes
    ports:
      - "${PROXY_RIGHT_PORT}:6333"
    networks:
      - develop
    depends_on:
      temporal-right:
        condition: service_healthy
    healthcheck: # TODO: Replace with healthcheck endpoint.
      test:
        - CMD-SHELL
        - "wget -q -O /dev/null -T 3 http://localhost:6060/debug/pprof/ || exit 1"
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 10s

  proxy-left:
    build:
      context: ../..
      dockerfile: Dockerfile
    environment:
      CONFIG_YML: /etc/develop/docker-compose/develop.proxy-left.yaml
    volumes: *x-volumes
    ports:
      - "${PROXY_LEFT_PORT}:6233"
    networks:
      - develop
    depends_on:
      temporal-left:
        condition: service_healthy
      proxy-right:
        condition: service_healthy
    healthcheck: # TODO: Replace with healthcheck endpoint.
      test:
        - CMD-SHELL
        - "wget -q -O /dev/null -T 3 http://localhost:6060/debug/pprof/ || exit 1"
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 10s

  smoke-test:
    image: temporalio/temporal:1.5.0
    networks:
      - develop
    depends_on:
      proxy-left:
        condition: service_healthy
      proxy-right:
        condition: service_healthy
    volumes: *x-volumes
    command:
      - sh
      - /etc/develop/docker-compose/smoke-test.sh

networks:
  develop:
    driver: bridge
